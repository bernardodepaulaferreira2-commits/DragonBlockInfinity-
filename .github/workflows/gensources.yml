name: GenSources
on: workflow_dispatch
jobs:
  gensources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: GenSources
        run: ./gradlew genSources --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: sources
          path: .gradle/loom-cache/
